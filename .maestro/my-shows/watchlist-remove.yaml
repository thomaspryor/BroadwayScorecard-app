# My Shows — Watchlist Remove
# Verifies: tap remove → entry removed from list

appId: com.broadwayscorecard.app
---
- launchApp

# Navigate to My Shows tab and sign in with dev bypass
- tapOn: "My Shows"
- tapOn:
    id: "Dev Sign In"

# Switch to watchlist tab
- tapOn:
    id: "Watchlist"

# Tap remove on first item
- tapOn:
    id: "Remove from watchlist"
    index: 0

# Item should be removed — watchlist count should decrement
