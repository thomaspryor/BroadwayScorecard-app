# My Shows — Watchlist Tab
# Verifies: watchlist tab loads and sort button works

appId: com.broadwayscorecard.app
---
- launchApp
- openLink: broadwayscorecard:///my-shows

# Switch to watchlist tab
- tapOn:
    text: "Watchlist.*"

# Sort button should be watchlist-specific
- assertVisible:
    text: "Sort watchlist.*"
