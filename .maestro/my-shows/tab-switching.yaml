# REQUIRES: dev auth bypass
# My Shows — Tab Switching
# Verifies: Diary ↔ Watchlist switching preserves state

appId: com.broadwayscorecard.app
---
- launchApp
# TODO: tap dev auth bypass button once it exists
# - tapOn: "Dev Sign In"

# Start on Diary tab
- assertVisible:
    id: "Diary"

# Switch to Watchlist
- tapOn:
    id: "Watchlist"

# Watchlist content should be visible
# Switch back to Diary
- tapOn:
    id: "Diary"

# Diary content should still be there (state preserved)
