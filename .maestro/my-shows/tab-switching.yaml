# My Shows — Tab Switching
# Verifies: Diary ↔ Watchlist switching works

appId: com.broadwayscorecard.app
---
- launchApp
- openLink: broadwayscorecard:///my-shows

# Start on Diary tab
- assertVisible: "Diary"

# Switch to Watchlist
- tapOn:
    text: "Watchlist.*"
- assertVisible: "Sort watchlist"

# Switch back to Diary
- tapOn: "Diary"
- assertVisible: "Sort diary"
