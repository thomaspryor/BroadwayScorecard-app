# My Shows — Diary Sort
# Verifies: sort cycles through Newest → Oldest → Top Rated

appId: com.broadwayscorecard.app
---
- launchApp

# Navigate to My Shows tab and sign in with dev bypass
- tapOn: "My Shows"
- tapOn:
    id: "Dev Sign In"

# Start on Diary tab
- tapOn:
    id: "Diary"

# Default sort should be "Newest"
- assertVisible: "Newest"

# Tap sort to cycle
- tapOn:
    id: "Sort diary"
- assertVisible: "Oldest"

# Tap again
- tapOn:
    id: "Sort diary"
- assertVisible: "Top Rated"

# Tap again — back to Newest
- tapOn:
    id: "Sort diary"
- assertVisible: "Newest"
