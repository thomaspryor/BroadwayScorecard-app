# My Shows — Diary Sort
# Verifies: sort button cycles through options

appId: com.broadwayscorecard.app
---
- launchApp
- openLink: broadwayscorecard:///my-shows

# Diary tab with sort button
- assertVisible: "Diary"
- assertVisible:
    text: "Sort diary.*"

# Tap sort button to cycle
- tapOn:
    text: "Sort diary.*"
