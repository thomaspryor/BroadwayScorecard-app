# Tab Smoke Test — Home
# Verifies: home tab loads with show data

appId: com.broadwayscorecard.app
---
- launchApp

# Dismiss iOS "Open in" dialog if present
- tapOn:
    text: "Open"
    optional: true

# Home tab is the default — wait for data to load (CI can be slow)
- extendedWaitUntil:
    visible: "Broadway Scorecard"
    timeout: 30000

# Should have show sections with data loaded
- extendedWaitUntil:
    visible: "Top Shows"
    timeout: 30000
- assertVisible:
    text: ".*shows scored by.*reviews"
