# Tab Smoke Test — Search
# Verifies: search tab loads, input accepts text

appId: com.broadwayscorecard.app
---
- launchApp

# Wait for app to load (home is default tab)
- extendedWaitUntil:
    visible: "Broadway Scorecard"
    timeout: 30000

# Navigate to Search tab
- tapOn: "Search"

# Header visible — wait for navigation
- extendedWaitUntil:
    visible: "Search"
    timeout: 30000

# Search input with placeholder
- assertVisible: "Search shows, theaters, creative team..."

# Type a search query
- tapOn: "Search shows, theaters, creative team..."
- inputText: "Hamilton"
