# Tab Smoke Test — Browse
# Verifies: browse tab loads with filters and show list

appId: com.broadwayscorecard.app
---
- launchApp
- openLink: broadwayscorecard:///browse

# Wait for and dismiss iOS "Open in" dialog
- extendedWaitUntil:
    visible: "Open"
    timeout: 5000
- tapOn: "Open"

# Header visible — wait for navigation + data load
- extendedWaitUntil:
    visible: "Browse Shows"
    timeout: 30000

# Filter pills should be present
- assertVisible: "Now Playing"
- assertVisible: "Musicals"
- assertVisible: "Plays"
