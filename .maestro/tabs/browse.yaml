# Tab Smoke Test — Browse
# Verifies: browse tab loads with filters and show list

appId: com.broadwayscorecard.app
---
- launchApp

# Wait for app to load (home is default tab)
- extendedWaitUntil:
    visible: "Broadway Scorecard"
    timeout: 30000

# Navigate to Browse tab (iOS labels tabs as "Browse, tab, 2 of 5")
- tapOn:
    text: "Browse, tab.*"

# Header visible — wait for data load (header text is just "Browse" for NYC)
- extendedWaitUntil:
    visible: "Browse"
    timeout: 30000

# Filter pills should be present
- assertVisible: "Now Playing"
- assertVisible: "Musicals"
- assertVisible: "Plays"
