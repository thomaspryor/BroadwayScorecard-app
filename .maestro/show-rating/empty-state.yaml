# Show Page Rating — Empty State
# Verifies: 5 star buttons visible, tap star opens ReviewPanel
# Fixture: /test/show-rating-fixture?state=empty

appId: com.broadwayscorecard.app
---
- launchApp
- openLink: broadwayscorecard://test/show-rating-fixture?state=empty
- assertVisible: "YOUR RATING"

# Verify all 5 star buttons are visible
- assertVisible: "1 star"
- assertVisible: "2 stars"
- assertVisible: "3 stars"
- assertVisible: "4 stars"
- assertVisible: "5 stars"

# No edit/delete/new viewing buttons in empty state
- assertNotVisible: "Edit rating"
- assertNotVisible: "New viewing"

# Watchlist button should be visible
- assertVisible: "Add to watchlist"

# Tap 4th star — ReviewPanel should open
- tapOn: "4 stars"
- assertVisible: "Save"
- assertVisible: "Cancel"
- assertVisible: "Private Notes (optional)"
- assertVisible: "Only visible to you"
- assertVisible: "Choose date seen"
