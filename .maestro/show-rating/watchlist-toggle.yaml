# Show Page Rating — Watchlist Toggle
# Verifies: Add/Remove from watchlist toggles correctly
# Fixture: /test/show-rating-fixture?state=empty (not watchlisted)

appId: com.broadwayscorecard.app
---
- launchApp
- openLink: broadwayscorecard://test/show-rating-fixture?state=empty

# Should start as "Add to watchlist"
- assertVisible: "Add to watchlist"

# Tap to add
- tapOn: "Add to watchlist"

# Should toggle to "Remove from watchlist"
- assertVisible: "Remove from watchlist"

# Tap to remove
- tapOn: "Remove from watchlist"

# Should toggle back to "Add to watchlist"
- assertVisible: "Add to watchlist"

# Test from existing state (already watchlisted)
- openLink: broadwayscorecard://test/show-rating-fixture?state=existing

# Should show "Remove from watchlist" (existing state is watchlisted)
- assertVisible: "Remove from watchlist"

# Toggle off
- tapOn: "Remove from watchlist"
- assertVisible: "Add to watchlist"
