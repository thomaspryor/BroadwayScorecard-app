# Show Page Rating — Save Flow
# Verifies: tap star → fill review → Save → panel closes, edit/delete appear
# Fixture: /test/show-rating-fixture?state=empty

appId: com.broadwayscorecard.app
---
- launchApp
- openLink: broadwayscorecard://test/show-rating-fixture?state=empty

# Tap 4 stars to open panel
- tapOn:
    id: "4 stars"
- assertVisible: "Save"

# Fill in review text
- tapOn:
    id: "Private notes"
- inputText: "Incredible performances, Lin-Manuel Miranda is a genius"

# Tap Save
- tapOn:
    id: "Save"

# Panel should close — Save/Cancel should disappear
- assertNotVisible: "Save"
- assertNotVisible: "Cancel"

# Edit and delete buttons should now be visible
- assertVisible:
    id: "Edit rating"
- assertVisible:
    id: "Delete rating"
- assertVisible:
    id: "New viewing"
