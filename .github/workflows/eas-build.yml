name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build:
    name: EAS Build (iOS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API Key
        run: echo "${{ secrets.ASC_API_KEY_P8 }}" > /tmp/AuthKey.p8

      - name: Build iOS & submit to TestFlight
        env:
          EXPO_ASC_API_KEY_PATH: /tmp/AuthKey.p8
        run: eas build --platform ios --profile production --non-interactive --auto-submit
