name: Maestro E2E Tests
on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - show-rating
          - my-shows
          - tabs

jobs:
  e2e:
    name: Maestro E2E (${{ inputs.suite }})
    runs-on: macos-15
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_DEV_AUTO_SIGNIN: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (for Maestro)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
              for d in devices:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid'])
                  sys.exit(0)
          " 2>/dev/null || true)

          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl create "Test iPhone" "iPhone 16 Pro" 2>/dev/null || true)
          fi

          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Expo prebuild (generate ios/)
        run: npx expo prebuild --platform ios --clean

      - name: Cache Xcode build
        uses: actions/cache@v4
        with:
          path: ios/build
          key: xcode-build-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'package-lock.json') }}
          restore-keys: |
            xcode-build-${{ runner.os }}-

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build app for Simulator
        run: |
          xcodebuild \
            -workspace ios/BroadwayScorecard.xcworkspace \
            -scheme BroadwayScorecard \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath ios/build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

      - name: Install app on Simulator
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

      - name: Start Metro and pre-warm bundle
        run: |
          npx expo start --port 8081 &
          echo "Waiting for Metro to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8081/status 2>/dev/null | grep -q "packager-status:running"; then
              echo "Metro is running"
              break
            fi
            sleep 2
          done
          echo "Pre-warming JS bundle (this takes 30-60s on first run)..."
          curl -s "http://localhost:8081/index.bundle?platform=ios&dev=true&minify=false" > /dev/null
          echo "Bundle ready"

      - name: Launch app and connect to Metro
        run: |
          # Launch app first
          xcrun simctl launch "$DEVICE_ID" com.broadwayscorecard.app
          sleep 3
          # Connect dev client to Metro via expo-development-client URL scheme
          xcrun simctl openurl "$DEVICE_ID" "exp+broadwayscorecard://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
          sleep 10
          # Take a diagnostic screenshot
          xcrun simctl io "$DEVICE_ID" screenshot /tmp/app-screenshot.png || true

      - name: Upload diagnostic screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshot
          path: /tmp/app-screenshot.png
          retention-days: 3

      - name: Run Maestro tests
        run: |
          case "${{ inputs.suite }}" in
            all)          PATTERN=".maestro/**/*.yaml" ;;
            show-rating)  PATTERN=".maestro/show-rating/*.yaml" ;;
            my-shows)     PATTERN=".maestro/my-shows/*.yaml" ;;
            tabs)         PATTERN=".maestro/tabs/*.yaml" ;;
          esac

          FAILED=0
          for f in $PATTERN; do
            echo "=== Running $f ==="
            if ! maestro test "$f"; then
              FAILED=$((FAILED + 1))
              echo "FAILED: $f"
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: ~/.maestro/tests/
          retention-days: 7
